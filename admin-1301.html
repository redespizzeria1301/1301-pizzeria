<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Pizzería 1301</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F8F7FF; --dark: #1A1A2E; --gray: #64748B;
      --gray-light: #F0EEFF; --purple: #6B5CE7; --purple-dark: #5244C8;
      --white: #FFFFFF; --green: #22c55e; --orange: #f59e0b; --red: #ef4444;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); }

    #loginScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: var(--dark); }
    #loginScreen.hidden { display: none; }
    .login-box { background: #fff; border-radius: 20px; padding: 36px 32px; width: 100%; max-width: 360px; }
    .login-logo { text-align: center; margin-bottom: 24px; }
    .login-logo h1 { font-size: 1.4rem; font-weight: 900; }
    .login-logo h1 em { font-style: normal; color: var(--purple); }
    .login-logo p { font-size: 12px; color: var(--gray); margin-top: 4px; letter-spacing: .05em; text-transform: uppercase; font-weight: 700; }
    .ff { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .ff label { font-size: 11px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: .05em; }
    .ff input { border: 1.5px solid var(--gray-light); border-radius: 10px; padding: 11px 14px; font-family: 'Inter',sans-serif; font-size: 15px; outline: none; transition: border-color .2s; }
    .ff input:focus { border-color: var(--purple); }
    .btn-login { background: var(--purple); color: #fff; border: none; border-radius: 12px; font-family: 'Inter',sans-serif; font-size: 16px; font-weight: 800; padding: 13px; width: 100%; cursor: pointer; margin-top: 4px; transition: background .15s; }
    .btn-login:hover { background: var(--purple-dark); }
    .login-err { background: #fff0f0; border: 1px solid #ffcccc; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #c00; display: none; margin-bottom: 12px; }
    .login-err.show { display: block; }

    #appScreen { display: none; min-height: 100vh; }
    #appScreen.show { display: block; }
    header { background: var(--dark); color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .hdr-brand { font-size: 1rem; font-weight: 900; }
    .hdr-brand em { color: var(--purple); font-style: normal; }
    .hdr-right { display: flex; align-items: center; gap: 10px; }
    .hdr-user { font-size: 13px; color: rgba(255,255,255,.5); }
    .btn-logout { background: rgba(255,255,255,.12); border: none; color: #fff; font-family: 'Inter',sans-serif; font-size: 13px; font-weight: 600; padding: 7px 14px; border-radius: 8px; cursor: pointer; }
    .btn-logout:hover { background: rgba(255,255,255,.22); }
    .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; display: inline-block; margin-right: 6px; animation: blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .tab-bar { background: var(--white); border-bottom: 2px solid var(--gray-light); padding: 0 24px; display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn { padding: 15px 20px; border: none; background: transparent; font-family: 'Inter',sans-serif; font-size: 14px; font-weight: 700; color: var(--gray); cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; transition: all .2s; }
    .tab-btn.active { color: var(--purple); border-bottom-color: var(--purple); }
    .tab-content { display: none; padding: 24px; max-width: 960px; margin: 0 auto; }
    .tab-content.active { display: block; }

    .orders-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .orders-hdr h2 { font-size: 1.3rem; font-weight: 900; }
    .orders-hdr span { font-size: 13px; color: var(--gray); }
    .order-card { background: var(--white); border: 1.5px solid var(--gray-light); border-radius: 16px; padding: 20px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
    .order-card.pendiente { border-left: 5px solid var(--orange); }
    .order-card.preparando { border-left: 5px solid var(--purple); }
    .order-card.listo { border-left: 5px solid var(--green); }
    .order-card.entregado { border-left: 5px solid var(--gray); opacity: .65; }
    .order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .order-id { font-size: 11px; font-weight: 700; color: var(--gray); letter-spacing: .08em; }
    .order-time { font-size: 12px; color: var(--gray); }
    .order-client { font-size: 1.05rem; font-weight: 800; margin-bottom: 4px; }
    .order-tel { font-size: 13px; color: var(--gray); margin-bottom: 2px; }
    .order-dir { font-size: 13px; color: var(--gray); margin-bottom: 12px; }
    .order-items { background: var(--bg); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; }
    .oi { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
    .oi-name { font-weight: 600; }
    .oi-price { color: var(--gray); }
    .order-total { display: flex; justify-content: space-between; font-size: 15px; font-weight: 900; margin-bottom: 12px; }
    .order-pay { font-size: 13px; font-weight: 700; color: var(--gray); margin-bottom: 14px; }
    .order-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-status { border: none; border-radius: 8px; font-family: 'Inter',sans-serif; font-size: 13px; font-weight: 700; padding: 8px 14px; cursor: pointer; transition: all .15s; }
    .btn-status.next { background: var(--purple); color: #fff; }
    .btn-status.next:hover { background: var(--purple-dark); }
    .btn-status.print { background: var(--gray-light); color: var(--dark); }
    .btn-status.print:hover { background: #e0dcff; }
    .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; }
    .st-pendiente { background: #fef3c7; color: #92400e; }
    .st-preparando { background: var(--gray-light); color: var(--purple-dark); }
    .st-listo { background: #dcfce7; color: #166534; }
    .st-encamino { background: #dbeafe; color: #1e40af; }
    .st-entregado { background: #f3f4f6; color: #6b7280; }
    .order-card.encamino { border-left: 5px solid #3b82f6; }
    .orders-empty { text-align: center; padding: 60px 20px; color: var(--gray); font-size: 15px; }

    .winners-table { width: 100%; border-collapse: collapse; }
    .winners-table th { text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--gray); padding: 10px 14px; border-bottom: 2px solid var(--gray-light); }
    .winners-table td { padding: 12px 14px; border-bottom: 1px solid var(--gray-light); font-size: 14px; }
    .winners-table tr:last-child td { border-bottom: none; }
    .winners-card { background: var(--white); border-radius: 16px; overflow: hidden; border: 1.5px solid var(--gray-light); }

    .prod-section { margin-bottom: 28px; }
    .prod-cat-title { font-size: .72rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--purple); margin-bottom: 10px; }
    .prod-item { background: var(--white); border: 1.5px solid var(--gray-light); border-radius: 12px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 12px; }
    .prod-item.inactive { opacity: .5; }
    .prod-info { flex: 1; }
    .prod-name { font-size: 15px; font-weight: 800; }
    .prod-desc { font-size: 12px; color: var(--gray); margin-top: 2px; }
    .prod-price { font-size: 15px; font-weight: 800; margin-right: 12px; }
    .toggle-switch { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: #cbd5e1; border-radius: 24px; cursor: pointer; transition: background .2s; }
    .toggle-slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.15); }
    input:checked + .toggle-slider { background: var(--green); }
    input:checked + .toggle-slider::before { transform: translateX(20px); }

    @media print {
      body * { visibility: hidden; }
      #printArea, #printArea * { visibility: visible; }
      #printArea { position: fixed; inset: 0; width: 80mm; margin: 0 auto; font-family: 'Courier New', monospace; font-size: 12px; color: #000; background: #fff; padding: 4mm; }
    }
    #printArea { display: none; }
  </style>
</head>
<body>

<div id="printArea"></div>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <h1>Pizzería <em>1301</em></h1>
      <p>Panel de administración</p>
    </div>
    <div class="login-err" id="loginErr"></div>
    <form onsubmit="doLogin(event)">
      <div class="ff"><label>Usuario</label><input type="text" id="liUser" placeholder="tu_usuario" required /></div>
      <div class="ff"><label>Contraseña</label><input type="password" id="liPass" placeholder="••••••••" required /></div>
      <button type="submit" class="btn-login" id="loginBtn">Entrar</button>
    </form>
  </div>
</div>

<div id="appScreen">
  <header>
    <div class="hdr-brand">Pizzería <em>1301</em> — Admin</div>
    <div class="hdr-right">
      <span class="hdr-user" id="hdrUser"></span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('pedidos')">📋 Pedidos del día</button>
    <button class="tab-btn" onclick="switchTab('ruleta')">🎡 Ganadores Ruleta</button>
    <button class="tab-btn" onclick="switchTab('productos')">🍕 Productos</button>
  </div>

  <div id="tab-pedidos" class="tab-content active">
    <div class="orders-hdr">
      <h2><span class="live-dot"></span>Pedidos</h2>
      <button id="btnSonido" onclick="activarSonido()" style="background:#F0EEFF;border:none;border-radius:8px;font-family:Inter,sans-serif;font-size:13px;font-weight:700;padding:7px 14px;cursor:pointer;color:#6B5CE7">🔇 Activar sonido</button>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <input type="date" id="dateFilter" style="border:1.5px solid #F0EEFF;border-radius:10px;padding:8px 12px;font-family:Inter,sans-serif;font-size:14px;font-weight:600;outline:none;cursor:pointer" onchange="loadOrders()" />
        <span id="ordersCount" style="font-size:13px;color:#64748B"></span>
      </div>
    </div>
    <div id="ordersContainer"><div class="orders-empty">Cargando pedidos...</div></div>
  </div>

  <div id="tab-ruleta" class="tab-content">
    <div class="orders-hdr">
      <h2>Ganadores de la Ruleta</h2>
      <span id="winnersCount"></span>
    </div>
    <div class="winners-card">
      <table class="winners-table">
        <thead><tr><th>#</th><th>Nombre</th><th>Premio</th><th>Fecha</th></tr></thead>
        <tbody id="winnersBody"><tr><td colspan="4" style="text-align:center;padding:30px;color:#64748B">Cargando...</td></tr></tbody>
      </table>
    </div>
  </div>

  <div id="tab-productos" class="tab-content">
    <div class="orders-hdr">
      <h2>Gestión de Productos</h2>
      <span style="font-size:13px;color:#64748B">Activá o desactivá según el stock</span>
    </div>
    <div id="prodsContainer">Cargando productos...</div>
  </div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient('https://taxianozqtssxnukrwan.supabase.co','sb_publishable_wmo-3E-mwQQ4KigDv3qgjA_rikAURQs');
const mkEmail = u => `${u.toLowerCase().trim()}@pediteapp.com`;

let currentUser = null, realtimeSub = null;

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn'); btn.textContent='Entrando...'; btn.disabled=true;
  document.getElementById('loginErr').classList.remove('show');
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email: mkEmail(document.getElementById('liUser').value), password: document.getElementById('liPass').value });
    if (error) throw new Error('Credenciales incorrectas.');
    const { data: perfil } = await sb.from('perfiles').select('*').eq('id', data.user.id).single();
    if (!perfil?.es_admin) { await sb.auth.signOut(); throw new Error('No tenés permisos de administrador.'); }
    currentUser = { ...data.user, perfil };
    enterApp();
  } catch(err) {
    const el = document.getElementById('loginErr'); el.textContent = err.message; el.classList.add('show');
  } finally { btn.textContent='Entrar'; btn.disabled=false; }
}

async function doLogout() { if(realtimeSub) sb.removeChannel(realtimeSub); await sb.auth.signOut(); currentUser=null; document.getElementById('appScreen').classList.remove('show'); document.getElementById('loginScreen').classList.remove('hidden'); }

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return;
  const { data: perfil } = await sb.from('perfiles').select('*').eq('id', session.user.id).single();
  if (!perfil?.es_admin) return;
  currentUser = { ...session.user, perfil };
  enterApp();
})();

function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent.includes({pedidos:'Pedidos',ruleta:'Ruleta',productos:'Productos'}[id])));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
}

function enterApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.add('show');
  document.getElementById('hdrUser').textContent = currentUser.perfil.nombre + ' ' + currentUser.perfil.apellido;
  // set today as default date
  const today = new Date();
  document.getElementById('dateFilter').value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  loadOrders(); loadWinners(); loadProducts();
  subscribeOrders();
}

async function loadOrders() {
  const dateVal = document.getElementById('dateFilter').value;
  const from = new Date(dateVal + 'T03:00:00Z');
  const to = new Date(dateVal + 'T02:59:59Z');
  to.setDate(to.getDate() + 1);
  const { data } = await sb.from('pedidos').select('*').gte('created_at', from.toISOString()).lte('created_at', to.toISOString()).order('created_at', {ascending:false});
  renderOrders(data || []);
}

function renderOrders(orders) {
  const c = document.getElementById('ordersContainer');
  const cnt = document.getElementById('ordersCount');
  const active = orders.filter(o=>o.estado!=='entregado');
  cnt.textContent = `${orders.length} pedido${orders.length!==1?'s':''} hoy · ${active.length} activo${active.length!==1?'s':''}`;
  if (!orders.length) { c.innerHTML='<div class="orders-empty">Sin pedidos hoy todavía ☕</div>'; return; }
  c.innerHTML = orders.map(o => orderCard(o)).join('');
}

const STATUS_LABELS = { pendiente:'Pendiente', preparando:'Preparando', listo:'Listo', encamino:'En camino', entregado:'Entregado' };
const STATUS_NEXT = { pendiente:['preparando','Marcar preparando'], preparando:['listo','Marcar listo'], listo:['encamino','Marcar en camino'], encamino:['entregado','Marcar entregado'] };

function orderCard(o) {
  const d = new Date(o.created_at);
  const time = d.toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit'});
  const items = o.items.map(i=>`<div class="oi"><span class="oi-name">${esc(i.nombre)} x${i.qty}</span><span class="oi-price">$${i.precio*i.qty}</span></div>`).join('');
  const nextStatus = STATUS_NEXT[o.estado];
  const payTxt = o.metodo_pago==='efectivo' ? `Efectivo — cambio de $${o.cambio_de}` : 'Débito';
  return `<div class="order-card ${o.estado}" id="order-${o.id}">
    <div class="order-top">
      <div><div class="order-id">PEDIDO #${o.id}</div><span class="status-badge st-${o.estado}">${STATUS_LABELS[o.estado]}</span></div>
      <div class="order-time">${time}</div>
    </div>
    <div class="order-client">${esc(o.cliente_nombre)} ${esc(o.cliente_apellido)}</div>
    <div class="order-tel">📱 ${esc(o.cliente_telefono)}</div>
    <div class="order-dir">📍 ${esc(o.cliente_direccion||'Sin dirección')}</div>
    <div class="order-items">${items}</div>
    <div class="order-total"><span>Total</span><span>$${o.total}</span></div>
    <div class="order-pay">💳 ${payTxt}</div>
    <div class="order-actions">
      ${nextStatus ? `<button class="btn-status next" onclick="advanceOrder(${o.id},'${nextStatus[0]}')">${nextStatus[1]}</button>` : ''}
      <button class="btn-status print" onclick="printComanda(${o.id})">🖨️ Imprimir comanda</button>
      <button class="btn-status" style="background:#fff0f0;color:#c00" onclick="deleteOrder(${o.id})">🗑️ Eliminar</button>
    </div>
  </div>`;
}

async function advanceOrder(id, newStatus) {
  await sb.from('pedidos').update({estado:newStatus}).eq('id',id);
  loadOrders();
}

let audioEnabled = false;

function activarSonido() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  gain.gain.value = 0.01; osc.start(); osc.stop(ctx.currentTime + 0.01);
  audioEnabled = true;
  const btn = document.getElementById('btnSonido');
  btn.textContent = '🔔 Sonido activado';
  btn.style.background = '#dcfce7'; btn.style.color = '#166534';
  btn.onclick = null; btn.style.cursor = 'default';
}

function playBeep() {
  if (!audioEnabled) return;
  function beep() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 1000; gain.gain.value = 1;
    osc.start(); osc.stop(ctx.currentTime + 0.4);
  }
  beep();
  setTimeout(beep, 600);
}

function subscribeOrders() {
  let firstLoad = true;
  realtimeSub = sb.channel('admin-pedidos')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'pedidos'}, () => { if(!firstLoad) playBeep(); loadOrders(); })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'pedidos'}, () => loadOrders())
    .subscribe(() => { firstLoad = false; });
}

function printComanda(id) {
  sb.from('pedidos').select('*').eq('id',id).single().then(({data:o}) => {
    if (!o) return;
    const d = new Date(o.created_at);
    const payTxt = o.metodo_pago==='efectivo' ? `EFECTIVO - Cambio de $${o.cambio_de}` : 'DEBITO';
    const lines = [
      `================================`,
      `       PIZZERIA 1301`,
      `================================`,
      `Pedido #${o.id}`,
      `Fecha: ${d.toLocaleDateString('es-UY')} ${d.toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit'})}`,
      `--------------------------------`,
      `CLIENTE:`,
      `${o.cliente_nombre} ${o.cliente_apellido}`,
      `Tel: ${o.cliente_telefono}`,
      `Dir: ${o.cliente_direccion||'(sin direccion)'}`,
      `--------------------------------`,
      `ITEMS:`,
      ...o.items.map(i=>`${i.nombre}\n  x${i.qty}  $${i.precio*i.qty}`),
      `--------------------------------`,
      `TOTAL: $${o.total}`,
      `PAGO: ${payTxt}`,
      `================================`,
      `Estado: ${STATUS_LABELS[o.estado].toUpperCase()}`,
      `================================`,
    ].join('\n');
    document.getElementById('printArea').innerText = lines;
    document.getElementById('printArea').style.display = 'block';
    window.print();
    setTimeout(()=>{ document.getElementById('printArea').style.display='none'; },1000);
  });
}

async function loadWinners() {
  const SB_URL='https://taxianozqtssxnukrwan.supabase.co', SB_KEY='sb_publishable_wmo-3E-mwQQ4KigDv3qgjA_rikAURQs';
  const res = await fetch(SB_URL+'/rest/v1/participantes?select=nombre,porcentaje,fecha&order=fecha.desc',{headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  const data = await res.json();
  document.getElementById('winnersCount').textContent = `${data.length} participante${data.length!==1?'s':''}`;
  const tbody = document.getElementById('winnersBody');
  if (!data.length) { tbody.innerHTML='<tr><td colspan="4" style="text-align:center;padding:30px;color:#64748B">Sin ganadores todavía</td></tr>'; return; }
  tbody.innerHTML = data.map((r,i) => {
    const d = new Date(r.fecha);
    return `<tr><td style="color:#64748B;font-size:12px">${i+1}</td><td style="font-weight:700">${esc(r.nombre)}</td><td style="color:#6B5CE7;font-weight:700">${esc(r.porcentaje)}</td><td style="color:#64748B;font-size:12px">${d.toLocaleDateString('es-UY')} ${d.toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit'})}</td></tr>`;
  }).join('');
}

const CAT_ORDER = ['Combos','Promos','Pizzas','Pizzetas','Milanesas','Chivitos','Sandwiches','Otros'];

async function loadProducts() {
  const { data } = await sb.from('productos').select('*').order('orden');
  const bycat = {};
  (data||[]).forEach(p => { if(!bycat[p.categoria]) bycat[p.categoria]=[]; bycat[p.categoria].push(p); });
  const html = CAT_ORDER.filter(c=>bycat[c]).map(cat=>`
    <div class="prod-section">
      <div class="prod-cat-title">${cat}</div>
      ${bycat[cat].map(p=>`
        <div class="prod-item${p.activo?'':' inactive'}" id="prod-${p.id}">
          <div class="prod-info">
            <div class="prod-name">${esc(p.nombre)}</div>
            ${p.descripcion?`<div class="prod-desc">${esc(p.descripcion)}</div>`:''}
          </div>
          <span class="prod-price">$${p.precio}</span>
          <label class="toggle-switch">
            <input type="checkbox" ${p.activo?'checked':''} onchange="toggleProduct(${p.id},this.checked)" />
            <span class="toggle-slider"></span>
          </label>
        </div>`).join('')}
    </div>`).join('');
  document.getElementById('prodsContainer').innerHTML = html;
}

async function deleteOrder(id) {
  if (!confirm('¿Eliminar este pedido?')) return;
  await sb.from('pedidos').delete().eq('id', id);
  loadOrders();
}

async function toggleProduct(id, activo) {
  document.getElementById('prod-'+id).classList.toggle('inactive',!activo);
  await sb.from('productos').update({activo}).eq('id',id);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
